plugins {
    id 'com.android.application'
}

android {
    namespace         'com.example.ott'
    compileSdk         35

    defaultConfig {
        applicationId  'com.example.ott'
        minSdk          21          // Android 5.0 – minimum for TvInputService
        targetSdk       35
        versionCode     1
        versionName     '1.0'
    }

    buildTypes {
        release {
            minifyEnabled   false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Leanback UI (required for Android TV launcher category)
    implementation 'androidx.leanback:leanback:1.2.0'

    // ExoPlayer (Media3) – wire into OttTvInputService.OttSession
    implementation 'androidx.media3:media3-exoplayer:1.3.1'
    implementation 'androidx.media3:media3-exoplayer-hls:1.3.1'
    implementation 'androidx.media3:media3-ui:1.3.1'
}
